<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>停车场管理系统 - 用户端</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260311-3" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <p class="eyebrow">User Center</p>
          <h1>停车场管理</h1>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-btn is-active" data-section="home">用户首页</button>
          <button class="nav-btn" data-section="vehicles">我的车辆</button>
          <button class="nav-btn" data-section="current">当前停车</button>
          <button class="nav-btn" data-section="records">停车记录</button>
          <button class="nav-btn" data-section="payments">在线缴费</button>
        </nav>
      </aside>

      <main class="app-main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">用户首页</h2>
            <p class="muted">原生 JavaScript 版本</p>
          </div>
          <div class="topbar-actions">
            <span id="userInfo" class="user-chip"></span>
            <button id="logoutBtn" class="ghost-btn">退出登录</button>
          </div>
        </header>

        <section id="messageBox" class="message-box" hidden></section>

        <section id="homeSection" class="section-panel">
          <div id="homeSummary" class="summary-grid"></div>
        </section>

        <section id="vehiclesSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>我的车辆</h3>
            <button id="refreshVehiclesBtn" class="ghost-btn">刷新</button>
          </div>
          <form id="vehicleForm" class="inline-form">
            <label class="field compact-field">
              <span>车牌号</span>
              <input id="vehiclePlateNumber" type="text" maxlength="8" placeholder="例如：粤B12345" required />
            </label>
            <label class="checkbox-field">
              <input id="vehiclePrimary" type="checkbox" checked />
              <span>设为主车牌</span>
            </label>
            <button class="primary-btn" type="submit">绑定车辆</button>
          </form>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>车辆编号</th>
                  <th>车牌号</th>
                  <th>主车牌</th>
                  <th>绑定时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="vehiclesTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="currentSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>当前停车</h3>
            <button id="refreshCurrentBtn" class="ghost-btn">刷新</button>
          </div>
          <div id="currentCard" class="detail-card"></div>
        </section>

        <section id="recordsSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>停车记录</h3>
            <button id="refreshRecordsBtn" class="ghost-btn">刷新</button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>记录编号</th>
                  <th>车牌号</th>
                  <th>车位</th>
                  <th>入场时间</th>
                  <th>出场时间</th>
                  <th>停车时长</th>
                  <th>最终费用</th>
                  <th>支付状态</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="paymentsSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>在线缴费与支付记录</h3>
            <button id="refreshPaymentsBtn" class="ghost-btn">刷新</button>
          </div>
          <form id="paymentForm" class="inline-form">
            <label class="field compact-field">
              <span>记录编号</span>
              <input id="paymentRecordId" type="text" maxlength="10" placeholder="例如：R1002" required />
            </label>
            <label class="field compact-field">
              <span>支付方式</span>
              <select id="paymentMethod">
                <option value="WECHAT">微信</option>
                <option value="ALIPAY">支付宝</option>
              </select>
            </label>
            <button class="primary-btn" type="submit">模拟缴费</button>
          </form>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>支付编号</th>
                  <th>记录编号</th>
                  <th>支付方式</th>
                  <th>支付金额</th>
                  <th>状态</th>
                  <th>支付时间</th>
                </tr>
              </thead>
              <tbody id="paymentsTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/user.js?v=20260311-3"></script>
  </body>
</html>
