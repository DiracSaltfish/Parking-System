<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>停车场管理系统 - 管理员端</title>
    <link rel="stylesheet" href="./assets/styles.css?v=20260311-3" />
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <p class="eyebrow">Admin Panel</p>
          <h1>停车场管理</h1>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-btn is-active" data-section="dashboard">仪表盘</button>
          <button class="nav-btn" data-section="current">当前车辆</button>
          <button class="nav-btn" data-section="records">历史记录</button>
          <button class="nav-btn" data-section="spaces">车位管理</button>
        </nav>
      </aside>

      <main class="app-main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">管理员首页</h2>
            <p class="muted">原生 JavaScript 版本</p>
          </div>
          <div class="topbar-actions">
            <span id="userInfo" class="user-chip"></span>
            <button id="logoutBtn" class="ghost-btn">退出登录</button>
          </div>
        </header>

        <section id="messageBox" class="message-box" hidden></section>

        <section id="dashboardSection" class="section-panel">
          <div id="summaryCards" class="summary-grid"></div>
        </section>

        <section id="currentSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>当前在场车辆</h3>
            <button id="refreshCurrentBtn" class="ghost-btn">刷新</button>
          </div>
          <form id="entryForm" class="inline-form">
            <label class="field compact-field">
              <span>车牌号</span>
              <input id="entryPlateNumber" type="text" maxlength="8" placeholder="例如：粤B12345" required />
            </label>
            <label class="field compact-field">
              <span>车位类型</span>
              <select id="entrySpaceType">
                <option value="NORMAL">普通车位</option>
                <option value="NEW_ENERGY">新能源车位</option>
                <option value="VIP">VIP 车位</option>
              </select>
            </label>
            <button class="primary-btn" type="submit">手动录入入场</button>
          </form>
          <p class="inline-note">系统会根据所选车位类型自动分配对应车位。</p>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>记录编号</th>
                  <th>车牌号</th>
                  <th>车主</th>
                  <th>车位</th>
                  <th>入场时间</th>
                  <th>停车时长</th>
                  <th>当前费用</th>
                  <th>状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="currentTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="recordsSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>历史停车记录</h3>
            <button id="refreshRecordsBtn" class="ghost-btn">刷新</button>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>记录编号</th>
                  <th>车牌号</th>
                  <th>车位</th>
                  <th>入场时间</th>
                  <th>出场时间</th>
                  <th>停车时长</th>
                  <th>最终费用</th>
                  <th>支付状态</th>
                  <th>记录状态</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody"></tbody>
            </table>
          </div>
        </section>

        <section id="spacesSection" class="section-panel" hidden>
          <div class="panel-head">
            <h3>车位管理</h3>
            <button id="refreshSpacesBtn" class="ghost-btn">刷新</button>
          </div>
          <form id="spaceForm" class="inline-form">
            <label class="field compact-field">
              <span>车位编号</span>
              <input id="spaceCode" type="text" maxlength="5" placeholder="例如：A-025" required />
            </label>
            <label class="field compact-field">
              <span>车位类型</span>
              <select id="spaceType">
                <option value="NORMAL">普通车位</option>
                <option value="NEW_ENERGY">新能源车位</option>
                <option value="VIP">VIP 车位</option>
              </select>
            </label>
            <label class="field compact-field">
              <span>楼层</span>
              <input id="spaceFloor" type="text" maxlength="10" value="B1" required />
            </label>
            <label class="field compact-field">
              <span>备注</span>
              <input id="spaceRemark" type="text" maxlength="30" placeholder="例如：靠近电梯" />
            </label>
            <button class="primary-btn" type="submit">新增车位</button>
          </form>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>车位编号</th>
                  <th>类型</th>
                  <th>状态</th>
                  <th>楼层</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="spacesTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./assets/admin.js?v=20260311-3"></script>
  </body>
</html>
