server:
  port: 8080

spring:
  application:
    name: parking-management
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms

app:
  auth:
    token-prefix: Bearer
  redis:
    enabled: true

# 当前阶段默认连接本机 Redis：127.0.0.1:6379
